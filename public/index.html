<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#23272e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PWA Tools" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>%WEB_TITLE%</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* iPhone PWA：使用 dvh 與 safe-area，避免底部露出白邊 */
      html {
        height: 100%;
        width: 100%;
        max-width: 100%;
        overflow: hidden;
        background-color: #23272e;
      }
      body {
        margin: 0;
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        background-color: #23272e;
        overflow: hidden;
        overscroll-behavior: none;
      }
      #root {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        height: 100%;
        overflow: hidden;
        background-color: #23272e;
      }
      #root > * {
        display: flex;
        flex: 1;
        flex-direction: column;
        min-height: 0;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
    <script>
      (function () {
        // 診斷旗標：?noRecover=1 完全停用捲動恢復，用於實機對照實驗（PWA-001）
        function isRecoveryDisabled() {
          return /[?&]noRecover(?:=|&|$)/.test(window.location.search);
        }

        if (isRecoveryDisabled()) {
          return;
        }

        function isStandalone() {
          return (
            window.navigator.standalone === true ||
            window.matchMedia('(display-mode: standalone)').matches
          );
        }

        function resetDocumentScroll() {
          window.scrollTo(0, 0);
          document.documentElement.scrollTop = 0;
          document.body.scrollTop = 0;
        }

        function kickScrollContainers() {
          var marked = document.querySelectorAll('[data-pwa-scroll="true"]');
          var elements = marked.length
            ? Array.prototype.slice.call(marked)
            : Array.prototype.slice.call(document.querySelectorAll('#root div')).filter(function (el) {
                var overflowY = window.getComputedStyle(el).overflowY;
                return overflowY === 'auto' || overflowY === 'scroll';
              });

          elements.forEach(function (el) {
            var top = el.scrollTop;
            el.style.webkitOverflowScrolling = 'touch';
            el.style.touchAction = 'pan-y';
            el.scrollTop = top + 1;
            el.scrollTop = top;
            void el.offsetHeight;
          });
        }

        function recoverScroll() {
          resetDocumentScroll();
          [document.documentElement, document.body].forEach(function (el) {
            if (el.style.position === 'fixed') {
              el.style.position = '';
              el.style.top = '';
              el.style.left = '';
              el.style.width = '';
              el.style.height = '';
              el.style.overflow = '';
            }
          });
          kickScrollContainers();
        }

        function scheduleResumeRecovery() {
          [0, 50, 150, 300, 500, 800].forEach(function (delay) {
            window.setTimeout(recoverScroll, delay);
          });
        }

        // 方向 A：focusin 僅 kick 內層容器，不再 staggeredReset；移除 visualViewport reset
        document.addEventListener('focusin', function () {
          if (isStandalone()) kickScrollContainers();
        });
        window.addEventListener('pageshow', scheduleResumeRecovery);
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') scheduleResumeRecovery();
        });
        window.addEventListener('online', scheduleResumeRecovery);
        scheduleResumeRecovery();
      })();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').catch((error) => {
            console.error('Service Worker registration failed:', error);
          });
        });
      }
    </script>
  </body>
</html>
